<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Vym</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/base.css">
<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/components.css">
<link rel="stylesheet" href="./css/mobile.css">
<link rel="stylesheet" href="./css/train.css">
<link rel="stylesheet" href="./css/dashboard.css">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0b0d10">
</head>

<body>
<main class="page">
  <div class="container">
    <header style="padding:0 0 4px">
      <div class="brand-mark" style="font-size:16px"><span class="gym">GYM</span><span class="vym">VYM</span></div>
      <div class="greeting">
        <h1 id="greetingName">Fala!</h1>
        <p id="greetingDate">—</p>
      </div>
    </header>

    <div class="week-card" style="margin-top:14px">
      <div class="section-title">Sua semana</div>
      <div class="week-row" id="weekRow"></div>
    </div>

    <div id="heroSection" style="margin-top:14px"></div>

    <div class="progress-card" style="margin-top:14px">
      <div class="ring">
        <svg width="92" height="92" viewBox="0 0 92 92">
          <circle cx="46" cy="46" r="39" stroke="#1b1f26" stroke-width="9" fill="none"/>
          <circle id="ringProgress" cx="46" cy="46" r="39" stroke="#e9b93b" stroke-width="9" fill="none"
                  stroke-linecap="round" stroke-dasharray="245" stroke-dashoffset="245"/>
        </svg>
        <div class="pct" id="ringPct">0%</div>
      </div>
      <div class="progress-info">
        <div class="big" id="progressBig">—</div>
        <div class="sub" id="progressSub">—</div>
        <div class="streak"><span class="fire">🔥</span> <span id="streakValue">0</span> dias de sequência</div>
      </div>
    </div>

    <div style="margin-top:14px">
      <div class="section-title">Recuperação</div>
      <div class="recovery-strip" id="recoveryStrip"></div>
    </div>
  </div>
</main>

<script type="module" src="./js/index.js"></script>
</body>
</html>
