<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas - Gym Vym</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/mobile.css">
<link rel="stylesheet" href="../css/hub.css">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#0b0d10">
</head>

<body>
<main class="page">
  <div class="container">
    <div class="shortcut-row">
      <a href="./exercises.html" class="shortcut-chip">
        <svg viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5"/><path d="M4 9 9 4l2 2-5 5z"/><path d="M15 20l5-5-2-2-5 5z"/></svg>
        Exercícios
      </a>
      <a href="./exercises.html?tab=biblioteca" class="shortcut-chip">
        <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Biblioteca
      </a>
      <a href="./ai-workout.html" class="shortcut-chip">
        <svg viewBox="0 0 24 24"><path d="M12 3v4"/><path d="M12 17v4"/><path d="M3 12h4"/><path d="M17 12h4"/><path d="M5.6 5.6l2.8 2.8"/><path d="M15.6 15.6l2.8 2.8"/><path d="M5.6 18.4l2.8-2.8"/><path d="M15.6 8.4l2.8-2.8"/></svg>
        Gerar com IA
      </a>
    </div>

    <div class="panel" style="padding:20px">
      <h2 id="formTitle">Nova ficha</h2>

      <div class="form-group">
        <label for="name">Nome</label>
        <input type="text" id="name" placeholder="Ex: Treino A - Peito e Tríceps">
      </div>

      <div class="form-group">
        <label for="description">Descrição</label>
        <input type="text" id="description" placeholder="Opcional">
      </div>

      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;color:var(--text)">
          <input type="checkbox" id="active" checked style="width:20px;height:20px">
          Ativa
        </label>
      </div>

      <button type="button" class="btn btn-primary" id="btnSave">Salvar</button>
      <button type="button" class="btn btn-secondary" id="btnCancel" style="display:none">Cancelar edição</button>

      <div id="mensagem" class="message"></div>
    </div>

    <div class="panel" id="listPanel" style="margin-top:16px"></div>
  </div>
</main>

<script type="module" src="../js/workouts.js"></script>
</body>
</html>
