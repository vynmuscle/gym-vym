<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas - Gym Vym</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/mobile.css">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#22c55e">
</head>

<body>
<main class="page">
  <div class="container">
    <div class="panel" style="padding:20px">
      <h2 id="formTitle">Nova ficha</h2>

      <div class="form-group">
        <label for="name">Nome</label>
        <input type="text" id="name" placeholder="Ex: Treino A - Peito e Tríceps">
      </div>

      <div class="form-group">
        <label for="description">Descrição</label>
        <input type="text" id="description" placeholder="Opcional">
      </div>

      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;color:var(--text)">
          <input type="checkbox" id="active" checked style="width:20px;height:20px">
          Ativa
        </label>
      </div>

      <button type="button" class="btn btn-primary" id="btnSave">Salvar</button>
      <button type="button" class="btn btn-secondary" id="btnCancel" style="display:none">Cancelar edição</button>

      <div id="mensagem" class="message"></div>
    </div>

    <div class="panel" id="listPanel" style="margin-top:16px"></div>
  </div>
</main>

<script type="module" src="../js/workouts.js"></script>
</body>
</html>
